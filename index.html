<!DOCTYPE html>
<html>
<head>
<title>Ocean Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#00c6ff,#0072ff,#00e5a8);
background-size:300% 300%;
animation:bg 8s ease infinite;
color:white;
text-align:center;
}
@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.box{
background:rgba(255,255,255,0.15);
padding:35px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(0,0,0,.3);
}
h1{
font-size:42px;
margin:0;
}
p{
font-size:20px;
}
button{
padding:12px 28px;
border:none;
border-radius:30px;
font-size:18px;
background:white;
color:#0072ff;
cursor:pointer;
font-weight:bold;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="box">
<h1>🌊 Ocean Store</h1>
<p>Something Amazing is Coming Soon!</p>
<button>Coming Soon 🚀</button>
</div>

</body>
</html>
