<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌊 Ocean Store</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(-45deg,#00b4ff,#0077ff,#00d4aa,#0044ff);
background-size:400% 400%;
animation:bg 10s ease infinite;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:420px;
padding:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,.4);
text-align:center;
animation:up 1s;
}

@keyframes up{
from{transform:translateY(50px);opacity:0;}
to{transform:translateY(0);opacity:1;}
}

h1{
font-size:40px;
margin:0;
}

h2{
font-size:22px;
margin-top:10px;
}

p{
font-size:17px;
line-height:1.6;
}

a{
color:#fff;
text-decoration:none;
font-weight:bold;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#0077ff;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">

<h1>🌊 Ocean Store</h1>
